services:
  db:
    image: postgres:16-alpine
    container_name: inventarios-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inventarios}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-inventarios}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - inventarios-net

  backend:
    build:
      context: ./backend
    container_name: inventarios-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-inventarios}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - inventarios-net

  frontend:
    build:
      context: ./frontend
    container_name: inventarios-frontend
    restart: unless-stopped
    environment:
      API_URL: http://localhost:8080/api
    depends_on:
      - backend
    ports:
      - "5173:8080"
    networks:
      - inventarios-net

networks:
  inventarios-net:
    driver: bridge

volumes:
  db_data:
