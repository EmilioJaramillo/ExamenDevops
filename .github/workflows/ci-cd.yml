name: CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: inventarios
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run backend tests
        working-directory: backend
        run: mvn -B test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/inventarios
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm install
      - name: Build frontend (valida que compile sin errores)
        working-directory: frontend
        run: npm run build

  build-and-push:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.vars.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push backend image
        working-directory: backend
        run: |
          docker build -t ${{ steps.ecr-login.outputs.registry }}/inventarios-backend:${{ steps.vars.outputs.tag }} .
          docker push ${{ steps.ecr-login.outputs.registry }}/inventarios-backend:${{ steps.vars.outputs.tag }}
      - name: Build and push frontend image
        working-directory: frontend
        run: |
          docker build -t ${{ steps.ecr-login.outputs.registry }}/inventarios-frontend:${{ steps.vars.outputs.tag }} .
          docker push ${{ steps.ecr-login.outputs.registry }}/inventarios-frontend:${{ steps.vars.outputs.tag }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name inventarios-cluster --region us-east-1
      - name: Deploy backend
        run: kubectl set image deployment/backend backend=904982166462.dkr.ecr.us-east-1.amazonaws.com/inventarios-backend:${{ needs.build-and-push.outputs.image-tag }}
      - name: Deploy frontend
        run: kubectl set image deployment/frontend frontend=904982166462.dkr.ecr.us-east-1.amazonaws.com/inventarios-frontend:${{ needs.build-and-push.outputs.image-tag }}
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend --timeout=180s
          kubectl rollout status deployment/frontend --timeout=180s
