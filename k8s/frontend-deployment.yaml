apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 904982166462.dkr.ecr.us-east-1.amazonaws.com/inventarios-frontend:v2
          ports:
            - containerPort: 8080
          env:
            - name: API_URL
              value: "http://ae3f035b484874bfbb67367e7a85a6ed-444872165.us-east-1.elb.amazonaws.com:8080/api"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
